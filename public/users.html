<link rel="stylesheet" href="style.css">

<div class="container">
  <h2>All Users</h2>

  <table id="table"></table>

  <button onclick="back()">Back</button>
</div>

<script>
fetch("/users")
.then(res=>res.json())
.then(data=>{
  let table = document.getElementById("table");

  data.forEach((u,i)=>{
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
      </tr>`;
  });
});

function back(){
  window.location="dashboard.html";
}
</script>
