<h2>All Students</h2>

<table border="1" id="table"></table>

<script>
fetch("https://student-app-1-51ox.onrender.com/users")
.then(res=>res.json())
.then(data=>{
  let table = document.getElementById("table");

  data.forEach((u,i)=>{
    table.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${u.name}</td>
      <td>${u.email}</td>
    </tr>`;
  });
})
.catch(err => console.log("Error:", err));
</script>
